name: CI - Selenium Grid (Maven + TestNG)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests on ${{ matrix.browser }}
    runs-on: ubuntu-latest

    # Start Selenium Grid (hub, node-chrome, node-firefox) as job services
    services:
      selenium-hub:
        image: selenium/hub:4.18.1
        ports:
          - 4442:4442
          - 4443:4443
          - 4444:4444
        options: >-
          --health-cmd="curl -s http://localhost:4444/status || exit 1"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=20

      chrome:
        image: selenium/node-chrome:4.18.1
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: 4442
          SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
        options: >-
          --shm-size="2g"
        # depends_on is implicit in GH services; hub must be healthy first

      firefox:
        image: selenium/node-firefox:4.18.1
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: 4442
          SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
        options: >-
          --shm-size="2g"

    strategy:
      fail-fast: false
      matrix:
        browser: [ chrome, firefox ]

    steps:
      - name: Checkout
      - uses: actions/checkout@v4

      - name: Set up Temurin JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Show Java & Maven
        run: |
          java -version
          mvn -v

      - name: Generate testng-ci.xml (injects params for browser & gridUrl)
        run: |
          cat > testng-ci.xml <<'EOF'
          <!DOCTYPE suite SYSTEM "https://testng.org/testng-1.0.dtd" >
          <suite name="Grid Suite" verbose="1" parallel="false">
            <parameter name="browser" value="${{ matrix.browser }}"/>
            <parameter name="gridUrl" value="http://localhost:4444"/>
            <test name="Grid Test">
              <classes>
                <!-- adjust to your package/class if needed -->
                <class name="demo.GridLoginTest"/>
              </classes>
            </test>
          </suite>
          EOF
          echo "Generated testng-ci.xml:"
          cat testng-ci.xml

      # Optional: wait for Grid to be reachable (hub /status)
      - name: Wait for Selenium Grid to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4444/status | jq -e '.value.ready | select(.==true)' > /dev/null; then
              echo "Grid is ready"; exit 0
            fi
            echo "Waiting for Grid... ($i)"
            sleep 2
          done
          echo "Grid did not become ready in time"; exit 1

      - name: Build & run tests on ${{ matrix.browser }}
        run: |
          mvn -B -DsuiteFile=testng-ci.xml test

      - name: Upload Test Reports (Surefire & TestNG)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.browser }}
          path: |
            target/surefire-reports/**
            test-output/**
          if-no-files-found: warn
